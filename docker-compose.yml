services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    # Keep the container running so "docker compose exec backend bash" works
    command: ["bash", "-lc", "sleep infinity"]
    stdin_open: true
    tty: true

    # Mount your local zeek-project folders into the container
    volumes:
      - ./pcaps:/data/pcaps
      - ./logs:/data/logs
      - ./scripts:/data/scripts
      - ./output:/data/output

    # Optional: only needed if you later run an API on 8000
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/packetiq

  db:
    image: pgvector/pgvector:pg16
    container_name: packetiq_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: packetiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

volumes:
  postgres_data: